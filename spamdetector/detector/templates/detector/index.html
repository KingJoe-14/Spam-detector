<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spam Detector</title>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f1117;
            color: #eaeaea;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }
        .card {
            background: #1a1d27;
            border-radius: 12px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h1 { font-size: 22px; margin-top: 0; }
        textarea {
            width: 100%;
            min-height: 120px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f1117;
            color: #eaeaea;
            padding: 12px;
            font-size: 15px;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            margin-top: 14px;
            background: #4f7cff;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #3a63e0; }
        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
        }
        .spam { background: #3a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b; }
        .ham  { background: #16301c; color: #4fd17b; border: 1px solid #4fd17b; }
        .meta { font-size: 13px; color: #999; margin-top: 6px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📩 SMS Spam Detector</h1>
        <form method="POST">
            {% csrf_token %}
            <textarea name="message" placeholder="Paste a text message here...">{{ message }}</textarea><br>
            <button type="submit">Check Message</button>
        </form>

        {% if label %}
        <div class="result {% if label == 'SPAM' %}spam{% else %}ham{% endif %}">
            {% if label == 'SPAM' %}🚨 SPAM{% else %}✅ HAM (looks legit){% endif %}
            {% if confidence is not None %}
            <div class="meta">Confidence score: {{ confidence }} (higher = more confidently spam)</div>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
